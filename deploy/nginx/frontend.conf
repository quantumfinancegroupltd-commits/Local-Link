# Compress text assets (JS, CSS, JSON, HTML) — often cuts transfer size 70%+
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_types application/javascript application/json application/xml text/css text/html text/plain text/xml;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Basic security headers (fine-tune once domain is connected)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer always;

  # Avoid caching the SPA shell so users always get latest after deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Long cache for hashed build assets.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # SPA fallback – do not cache so users always get latest app after deploy.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}


