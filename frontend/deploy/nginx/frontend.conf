server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # PDF.js worker (.mjs): serve as JavaScript (nginx default is application/octet-stream for .mjs)
  location ~ \.mjs$ {
    types { }
    default_type application/javascript;
    try_files $uri =404;
  }

  # Basic security headers (fine-tune once domain is connected)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}


